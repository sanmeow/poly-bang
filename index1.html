<!DOCTYPE html>
<html lang="zh-TW">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Shattered GUI</title>
    <style>

    </style>

    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading"><div class="spinner"></div><span id="load-text">生成幾何體...</span></div>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { ConvexGeometry } from 'three/addons/geometries/ConvexGeometry.js';
        import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

        let scene, camera, renderer, controls;
        
        const boundaryGroup = new THREE.Group();
        const pointsMesh = new THREE.Group();
        const cellGroup = new THREE.Group();

        const BASE_SIZE = 10;          
        const BASE_THICKNESS = 0.2;   

        // --- 控制台參數 ---
        const params = {
            shape: 'box',
            scaleX: 1.0,
            scaleY: 1.0,
            scaleZ: 1.0,
            pieces: 45,
            density: 1.5,
            regenerate: () => triggerRegenerate(),
            viewStep: 3, 
            renderMode: 'Solid',
            explode: 0.0,
            exportCleanMeshes: true, // 新增：是否匯出乾淨的獨立網格
            exportGLB: () => exportGLB()
        };
        
        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color('#e8ecef');

            camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(13, 15, 22); 

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight1.position.set(12, 20, 15);
            scene.add(dirLight1);
            
            const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
            dirLight2.position.set(-15, -10, -15);
            scene.add(dirLight2);

            scene.add(boundaryGroup);
            scene.add(pointsMesh);
            scene.add(cellGroup);

            setupGUI();
            triggerRegenerate();

            window.addEventListener('resize', onWindowResize);
        }

        // --- Three.js 風格面板設定 ---
        function setupGUI() {
            const gui = new GUI({ title: 'Shattered Settings', width: 280 });

            const folderShape = gui.addFolder('1. Shape & Scale');
            folderShape.add(params, 'shape', { '立方體 (Box)': 'box', '薄玻璃 (Plane)': 'plane', '球體 (Sphere)': 'sphere', '圓柱 (Cylinder)': 'cylinder' }).name('Shape').onChange(v => {
                if (v === 'cylinder') { params.scaleX = 0.5; params.scaleY = 1.5; params.scaleZ = 0.5; camera.position.set(13, 16, 24); } 
                else if (v === 'plane') { params.scaleX = 1; params.scaleY = 1; params.scaleZ = 1; camera.position.set(0, 0, 24); } 
                else { params.scaleX = 1; params.scaleY = 1; params.scaleZ = 1; camera.position.set(13, 15, 22); }
                
                gui.controllersRecursive().forEach(c => c.updateDisplay());
                triggerRegenerate();
                controls.update();
            });
            folderShape.add(params, 'scaleX', 0.2, 3).name('Scale X').onChange(applyScale);
            folderShape.add(params, 'scaleY', 0.2, 3).name('Scale Y').onChange(applyScale);
            folderShape.add(params, 'scaleZ', 0.2, 3).name('Scale Z').onChange(applyScale);

            const folderFrac = gui.addFolder('2. Fracture');
            folderFrac.add(params, 'pieces', 5, 160, 1).name('Pieces 碎裂數量').onFinishChange(triggerRegenerate);
            folderFrac.add(params, 'density', 1, 4, 0.1).name('Density 中心密集').onFinishChange(triggerRegenerate);
            folderFrac.add(params, 'regenerate').name('🔄 重新執行切割');

            const folderView = gui.addFolder('3. View & Animate');
            folderView.add(params, 'viewStep', { '1. 邊界': 1, '2. 擊碎點': 2, '3. 碎片': 3 }).name('Step').onChange(updateVisibility);
            folderView.add(params, 'renderMode', ['Solid', 'Wireframe']).name('Render Mode').onChange(updateVisibility);
            folderView.add(params, 'explode', 0, 1).name('Explode 爆開');

            // 將匯出功能獨立或是放在最底層
            gui.add(params, 'exportCleanMeshes').name('✅ 僅匯出獨立實體 (Clean)');
            gui.add(params, 'exportGLB').name('💾 匯出 GLB 模型');
        }

        // --- 核心演算法 ---
        function getBiasedRandom(density) {
            const r = Math.pow(Math.random(), density);
            return Math.random() < 0.5 ? -r : r; 
        }

        function getShapeData() {
            const points = [];
            const bounds = [];
            let boundaryGeom;
            
            const hS = BASE_SIZE / 2;
            const piecesCount = params.pieces;
            const density = params.density;

            if (params.shape === 'box') {
                for(let i=0; i<piecesCount; i++) {
                    points.push(new THREE.Vector3(
                        getBiasedRandom(density) * hS * 0.95,
                        getBiasedRandom(density) * hS * 0.95,
                        getBiasedRandom(density) * hS * 0.95
                    ));
                }
                bounds.push(
                    new THREE.Plane(new THREE.Vector3(1, 0, 0), -hS),
                    new THREE.Plane(new THREE.Vector3(-1, 0, 0), -hS),
                    new THREE.Plane(new THREE.Vector3(0, 1, 0), -hS),
                    new THREE.Plane(new THREE.Vector3(0, -1, 0), -hS),
                    new THREE.Plane(new THREE.Vector3(0, 0, 1), -hS),
                    new THREE.Plane(new THREE.Vector3(0, 0, -1), -hS)
                );
                boundaryGeom = new THREE.BoxGeometry(BASE_SIZE, BASE_SIZE, BASE_SIZE);
                
            } else if (params.shape === 'plane') {
                const hT = BASE_THICKNESS / 2;
                for(let i=0; i<piecesCount; i++) {
                    points.push(new THREE.Vector3(
                        getBiasedRandom(density) * hS * 0.95,
                        getBiasedRandom(density) * hS * 0.95,
                        (Math.random() - 0.5) * BASE_THICKNESS * 0.8 
                    ));
                }
                bounds.push(
                    new THREE.Plane(new THREE.Vector3(1, 0, 0), -hS),
                    new THREE.Plane(new THREE.Vector3(-1, 0, 0), -hS),
                    new THREE.Plane(new THREE.Vector3(0, 1, 0), -hS),
                    new THREE.Plane(new THREE.Vector3(0, -1, 0), -hS),
                    new THREE.Plane(new THREE.Vector3(0, 0, 1), -hT),
                    new THREE.Plane(new THREE.Vector3(0, 0, -1), -hT)
                );
                boundaryGeom = new THREE.BoxGeometry(BASE_SIZE, BASE_SIZE, BASE_THICKNESS);
                
            } else if (params.shape === 'sphere') {
                let count = 0;
                while(count < piecesCount) {
                    const r = Math.pow(Math.random(), density) * hS * 0.9;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2.0 * Math.random() - 1.0);
                    const x = r * Math.sin(phi) * Math.cos(theta);
                    const y = r * Math.sin(phi) * Math.sin(theta);
                    const z = r * Math.cos(phi);
                    points.push(new THREE.Vector3(x, y, z));
                    count++;
                }

                const dist = hS * 0.95;
                bounds.push(new THREE.Plane(new THREE.Vector3(1, 0, 0), -dist));
                bounds.push(new THREE.Plane(new THREE.Vector3(-1, 0, 0), -dist));
                bounds.push(new THREE.Plane(new THREE.Vector3(0, 1, 0), -dist));
                bounds.push(new THREE.Plane(new THREE.Vector3(0, -1, 0), -dist));
                bounds.push(new THREE.Plane(new THREE.Vector3(0, 0, 1), -dist));
                bounds.push(new THREE.Plane(new THREE.Vector3(0, 0, -1), -dist));
                const corners = [
                    new THREE.Vector3(1, 1, 1).normalize(), new THREE.Vector3(-1, 1, 1).normalize(),
                    new THREE.Vector3(1, -1, 1).normalize(), new THREE.Vector3(-1, -1, 1).normalize(),
                    new THREE.Vector3(1, 1, -1).normalize(), new THREE.Vector3(-1, 1, -1).normalize(),
                    new THREE.Vector3(1, -1, -1).normalize(), new THREE.Vector3(-1, -1, -1).normalize()
                ];
                corners.forEach(n => bounds.push(new THREE.Plane(n, -dist * 0.85)));
                boundaryGeom = new THREE.IcosahedronGeometry(hS, 1);

            } else if (params.shape === 'cylinder') {
                let count = 0;
                while(count < piecesCount) {
                    const r = Math.pow(Math.random(), density) * hS * 0.9;
                    const theta = Math.random() * Math.PI * 2;
                    const x = r * Math.cos(theta);
                    const z = r * Math.sin(theta);
                    const y = getBiasedRandom(density) * hS * 0.95;
                    points.push(new THREE.Vector3(x, y, z));
                    count++;
                }

                bounds.push(new THREE.Plane(new THREE.Vector3(0, 1, 0), -hS));
                bounds.push(new THREE.Plane(new THREE.Vector3(0, -1, 0), -hS));
                const sides = 12; 
                for (let i = 0; i < sides; i++) {
                    const theta = (i / sides) * Math.PI * 2;
                    bounds.push(new THREE.Plane(new THREE.Vector3(Math.cos(theta), 0, Math.sin(theta)), -hS));
                }
                boundaryGeom = new THREE.CylinderGeometry(hS, hS, BASE_SIZE, 16);
            }
            return { points, bounds, boundaryGeom };
        }

        function getPlaneIntersection(p1, p2, p3) {
            const n1 = p1.normal, d1 = p1.constant, n2 = p2.normal, d2 = p2.constant, n3 = p3.normal, d3 = p3.constant;
            const n2xn3 = new THREE.Vector3().crossVectors(n2, n3);
            const denom = n1.dot(n2xn3);
            if (Math.abs(denom) < 1e-6) return null;
            const v1 = n2xn3.multiplyScalar(-d1);
            const v2 = new THREE.Vector3().crossVectors(n3, n1).multiplyScalar(-d2);
            const v3 = new THREE.Vector3().crossVectors(n1, n2).multiplyScalar(-d3);
            return v1.add(v2).add(v3).divideScalar(denom);
        }

        function generateVoronoiCells(points, bounds) {
            const cells = [];
            const EPSILON = 1e-4;
            for (let i = 0; i < points.length; i++) {
                const p_i = points[i];
                const planes = [...bounds];
                for (let j = 0; j < points.length; j++) {
                    if (i === j) continue;
                    const p_j = points[j];
                    const normal = new THREE.Vector3().subVectors(p_j, p_i).normalize();
                    const midPoint = new THREE.Vector3().addVectors(p_i, p_j).multiplyScalar(0.5);
                    planes.push(new THREE.Plane(normal, -normal.dot(midPoint)));
                }

                const vertices = [];
                const nPlanes = planes.length;
                for (let a = 0; a < nPlanes - 2; a++) {
                    for (let b = a + 1; b < nPlanes - 1; b++) {
                        for (let c = b + 1; c < nPlanes; c++) {
                            const pt = getPlaneIntersection(planes[a], planes[b], planes[c]);
                            if (pt) {
                                let isInside = true;
                                for (let p = 0; p < nPlanes; p++) {
                                    if (planes[p].distanceToPoint(pt) > EPSILON) { isInside = false; break; }
                                }
                                if (isInside) {
                                    let duplicate = false;
                                    for(let v of vertices) { if (v.distanceToSquared(pt) < 1e-6) { duplicate = true; break; } }
                                    if (!duplicate) vertices.push(pt);
                                }
                            }
                        }
                    }
                }
                if (vertices.length >= 4) {
                    try {
                        const geometry = new ConvexGeometry(vertices);
                        geometry.computeBoundingBox();
                        const centroid = new THREE.Vector3();
                        geometry.boundingBox.getCenter(centroid);
                        geometry.userData = { centroid: centroid };
                        cells.push(geometry);
                    } catch (e) { }
                }
            }
            return cells;
        }

        function clearGroup(group) {
            const meshes = [];
            group.traverse(child => { if (child.isMesh || child.isLineSegments || child.isPoints) meshes.push(child); });
            meshes.forEach(m => {
                if(m.geometry) m.geometry.dispose();
                if(m.material) { Array.isArray(m.material) ? m.material.forEach(mat => mat.dispose()) : m.material.dispose(); }
            });
            while(group.children.length > 0) group.remove(group.children[0]);
        }

        function triggerRegenerate() {
            document.getElementById('loading').style.display = 'flex';
            setTimeout(() => {
                clearGroup(boundaryGroup);
                clearGroup(pointsMesh);
                clearGroup(cellGroup);

                generateDataAndMeshes();
                
                document.getElementById('loading').style.display = 'none';
                updateVisibility();
            }, 50);
        }

        function generateDataAndMeshes() {
            const { points, bounds, boundaryGeom } = getShapeData();

            const boxEdges = new THREE.EdgesGeometry(boundaryGeom);
            boundaryGroup.add(new THREE.LineSegments(boxEdges, new THREE.LineBasicMaterial({ color: 0x888888 })));

            const pointsGeom = new THREE.BufferGeometry().setFromPoints(points);
            pointsMesh.add(new THREE.Points(pointsGeom, new THREE.PointsMaterial({ color: 0x000000, size: 0.15 })));

            const cellGeometries = generateVoronoiCells(points, bounds);

            cellGeometries.forEach((geom, index) => {
                const group = new THREE.Group();
                let rough = 0.55; let metal = 0.05;
                if (params.shape === 'plane') { rough = 0.15; metal = 0.15; }
                if (params.shape === 'sphere') { rough = 0.35; metal = 0.1; }
                if (params.shape === 'cylinder') { rough = 0.4; metal = 0.1; }

                const gray = 0.6 + Math.random() * 0.3; 
                const solidMat = new THREE.MeshStandardMaterial({
                    color: new THREE.Color().setHSL(0, 0, gray),
                    roughness: rough, metalness: metal,
                    polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1
                });
                
                const solidMesh = new THREE.Mesh(geom, solidMat);
                solidMesh.name = "solid";
                group.add(solidMesh);

                const edgesGeom = new THREE.EdgesGeometry(geom, 15); 
                const wireframeMesh = new THREE.LineSegments(edgesGeom, new THREE.LineBasicMaterial({ color: 0x222222, linewidth: 1 }));
                wireframeMesh.name = "wireframe";
                group.add(wireframeMesh);

                group.userData.centroid = geom.userData.centroid;
                cellGroup.add(group);
            });
            applyScale();
        }

        function applyScale() {
            boundaryGroup.scale.set(params.scaleX, params.scaleY, params.scaleZ);
            pointsMesh.scale.set(params.scaleX, params.scaleY, params.scaleZ);
            cellGroup.scale.set(params.scaleX, params.scaleY, params.scaleZ);
        }

        function updateVisibility() {
            const step = Number(params.viewStep);
            boundaryGroup.visible = (step === 1 || step === 2);
            pointsMesh.visible = (step === 2);
            cellGroup.visible = (step === 3);
            
            cellGroup.children.forEach(cell => {
                const solid = cell.getObjectByName("solid");
                const wireframe = cell.getObjectByName("wireframe");
                if (params.renderMode === 'Solid') {
                    if (solid) solid.visible = true;
                    if (wireframe) wireframe.visible = true; 
                } else {
                    if (solid) solid.visible = false;
                    if (wireframe) wireframe.visible = true;
                }
            });
        }

        // --- 優化版 GLB 匯出功能 (分離獨立 Mesh) ---
        function exportGLB() {
            if (Number(params.viewStep) !== 3) { alert("請切換至「碎片(3)」檢視模式再進行匯出！"); return; }
            
            // 確保當下畫面運算完畢
            renderer.render(scene, camera);
            const exporter = new GLTFExporter();
            
            let exportTarget = cellGroup;

            // 如果使用者勾選了「僅匯出獨立實體 (Clean)」
            // 我們動態產生一個乾淨的群組，把每一塊實體 Mesh 直接拉出來，去除多餘的線框和子群組
            if (params.exportCleanMeshes) {
                exportTarget = new THREE.Group();
                exportTarget.name = `Shattered_${params.shape}_Root`;
                
                // 繼承主體的縮放與位置
                exportTarget.scale.copy(cellGroup.scale);
                exportTarget.position.copy(cellGroup.position);
                exportTarget.rotation.copy(cellGroup.rotation);

                cellGroup.children.forEach((cell, index) => {
                    const solid = cell.getObjectByName("solid");
                    if (solid && solid.visible) { // 只匯出有顯示的實體
                        const cleanMesh = solid.clone();
                        cleanMesh.name = `Piece_${index + 1}`; // 獨立命名，方便在 Blender 辨識
                        
                        // 將碎片當下的爆炸位移繼承過來
                        cleanMesh.position.copy(cell.position);
                        cleanMesh.rotation.copy(cell.rotation);
                        cleanMesh.scale.copy(cell.scale);
                        
                        exportTarget.add(cleanMesh);
                    }
                });
            }

            exporter.parse(
                exportTarget,
                function ( gltf ) {
                    const blob = new Blob( [ gltf ], { type: 'application/octet-stream' } );
                    const url = URL.createObjectURL( blob );
                    const link = document.createElement( 'a' );
                    link.style.display = 'none'; link.href = url;
                    
                    const explodePercent = Math.round(params.explode * 100);
                    // 檔名加上 clean 標記
                    const suffix = params.exportCleanMeshes ? "_clean" : "";
                    link.download = `Shattered_${params.shape}_${params.pieces}pcs_${explodePercent}pct${suffix}.glb`;
                    
                    document.body.appendChild( link ); link.click(); document.body.removeChild( link );
                    URL.revokeObjectURL( url );
                },
                function ( error ) { console.error(error); alert('匯出失敗'); },
                { binary: true } 
            );
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            if (Number(params.viewStep) === 3) {
                const maxExplodeDistance = 3.0; 
                cellGroup.children.forEach(cell => {
                    cell.position.copy(cell.userData.centroid).multiplyScalar(params.explode * maxExplodeDistance);
                });
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
